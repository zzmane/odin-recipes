<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Grilled Cheese</title>
</head>

<body>
    <h1>Grilled Cheese Sandwich</h1>
    <img src="../img/grilled.jpeg" alt="Sandwich Pic">
    <h4>Ingredients</h4>
    <ul>
        <li>Bread</li>
        <li>American Cheese</li>
        <li>Butter</li>
    </ul>
    <h4>Steps</h4>
    <ol>
        <li>Spread butter on bread and place on pan.</li>
        <li>Place cheese on bread and close with top bread.</li>
        <li>Cook one side then the other till golden brown and cheese is bubbling.</li>
        <li>Cut diagonally and serve.</li>
    </ol>
</body>

</html>
