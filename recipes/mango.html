<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Spicy Mango</title>
</head>

<body>
    <h1>Spicy Mango salad</h1>
    <img src="../img/mango.jpg" alt="mango pic">
    <h4>Ingredients</h4>
    <ul>
        <li>Mango</li>
        <li>Tajin Seasoning</li>
        <li>Sugar</li>
    </ul>
    <h4>Steps</h4>
    <ol>
        <li>Peel mango and cut into chunks. Add to a bowl</li>
        <li>Add sugar and tajin seasoning. Mix and let sit for 2-3 minutes, letting the moisture come out</li>

    </ol>
</body>

</html>
